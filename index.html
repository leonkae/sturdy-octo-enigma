<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Our Css</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"

  <body>
    <div class="main-parent">
      <div class="top-logo">
        <img src="assets/images/patta.png" alt="" />
      </div>
      <div class="main-content-wrapper">
        <img src="assets/images/1234.png" alt="" />
        <div class="child-element">
          <h1>Air max patta</h1>
        </div>
      </div>
      <div class="second-content-wrapper">
        <div class="logo-div">
          <img
            src="assets/images/original-af8cdeb3db8f1db9119bf48e5404a745-Photoroom.png"
            alt=""
          />
        </div>
      </div>
    </div>
    <div class="wide-banner"></div>
    <div class="items-wrapper">
      <div class="container">
        <div class="inner-container">
          <div class="row">
            <div class="col-lg-6 p-0">
              <div class="inner-col">
                <img
                  src="https://images.pexels.com/photos/9660924/pexels-photo-9660924.jpeg"

              </div>
            </div>
            <div class="col-lg-6 p-0">

            </div>
            <div class="col-lg-6 p-0">
              <div class="inner-col">
                <img
                  src="https://images.pexels.com/photos/12368133/pexels-photo-12368133.jpeg"
                  alt=""
                />
              </div>
            </div>
            <div class="col-lg-6 p-0">
              <div class="inner-col">
                <img
                  src="https://images.pexels.com/photos/18946888/pexels-photo-18946888.jpeg"
                  alt=""

          </div>
        </div>
      </div>
    </div>
